# SymmetricDS engine configuration for the local monitoring node.
# Remote sync is not yet configured — fill in registration.url and
# remote node details when the hub is ready.

engine.name=monitoring-node

# Database connection
db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
db.user=${POSTGRES_USER}
db.password=${POSTGRES_PASSWORD}

# Node identity
group.id=local
external.id=001

# Local sync URL (how other nodes reach this one)
sync.url=http://symmetricds:31415/sync/monitoring-node

# Hub registration URL — set this when the remote hub is available
# registration.url=http://<remote-hub>:31415/sync/<hub-engine-name>
